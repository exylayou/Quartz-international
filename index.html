<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Countertops & Cabinetry</title>
    <script>
      // Early protection for window.fetch in read-only environments
      (function() {
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && descriptor.configurable && descriptor.get && !descriptor.set) {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.debug('Suppressed fetch overwrite'); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {}

        window.addEventListener('error', function(event) {
          if (event.message && (
            event.message.indexOf('Cannot set property fetch') !== -1 || 
            event.message.indexOf('setting getter-only property "fetch"') !== -1
          )) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
